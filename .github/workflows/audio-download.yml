name: Download Freesound Audio

on:
  workflow_dispatch:
  schedule:
    - cron: "*/15 * * * *" # GIRA AUTOMATICAMENTE OGNI 15 MINUTI (IL MASSIMO CONSENTITO)

permissions:
  contents: write

jobs:
  download-audio:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; else pip install requests; fi

      - name: Download audio assets
        env:
          PIXABAY_API_KEY: ${{ secrets.PIXABAY_API_KEY }}
        run: |
          python download_audio.py

      - name: Commit and push changes
        run: |
          if [ -d "downloads" ]; then
            git add downloads/
          fi
          
          if git diff --cached --quiet; then
            echo "Nessun nuovo file da caricare in questo turno."
            exit 0
          fi
          
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git commit -m "Download rapido pacchetto audio [skip ci]"
          git fetch origin "${GITHUB_REF_NAME}"
          git pull --rebase --autostash origin "${GITHUB_REF_NAME}" || true
          git push origin "HEAD:${GITHUB_REF_NAME}"
